name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  native:
    name: Native package (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            musl: false
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            musl: true
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            musl: false
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            musl: true
          - os: macos-latest
            target: aarch64-apple-darwin
            musl: false
          - os: macos-15-intel
            target: x86_64-apple-darwin
            musl: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            musl: false
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            musl: false
    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install stable Rust target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install musl linker
        if: matrix.musl
        run: sudo apt-get update && sudo apt-get install --yes musl-tools
      - name: Verify tag and package versions
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          version=${GITHUB_REF_NAME#v}
          cargo xtask release "$version" --check
      - name: Build native executable
        run: cargo build --release -p rsproxy-cli --bin rsproxy --target ${{ matrix.target }} --locked
      - name: Verify native executable
        shell: bash
        run: |
          suffix=
          case "${{ matrix.target }}" in
            *-windows-*) suffix=.exe ;;
          esac
          "target/${{ matrix.target }}/release/rsproxy${suffix}" --version
      - name: Create npm native package
        shell: bash
        run: ./scripts/package-npm.sh native --target "${{ matrix.target }}" --manager npm
      - name: Upload npm native package
        uses: actions/upload-artifact@v7
        with:
          name: npm-${{ matrix.target }}
          path: dist/npm/*.tgz
          if-no-files-found: error
          retention-days: 14
      - name: Package release archive
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          version=${GITHUB_REF_NAME#v}
          name="rsproxy-v${version}-${{ matrix.target }}"
          mkdir -p dist/github
          case "${{ matrix.target }}" in
            *-windows-*)
              cp "target/${{ matrix.target }}/release/rsproxy.exe" rsproxy.exe
              7z a "dist/github/${name}.zip" rsproxy.exe LICENSE README.md
              ;;
            *)
              cp "target/${{ matrix.target }}/release/rsproxy" rsproxy
              tar -czf "dist/github/${name}.tar.gz" rsproxy LICENSE README.md
              ;;
          esac
      - name: Upload release archive
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v7
        with:
          name: archive-${{ matrix.target }}
          path: dist/github
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish npm and Bun packages
    if: startsWith(github.ref, 'refs/tags/')
    needs: native
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install Node with npm registry authentication
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Download native packages
        uses: actions/download-artifact@v6
        with:
          pattern: npm-*
          path: dist/npm
          merge-multiple: true
      - name: Create runtime and launcher packages
        run: ./scripts/package-npm.sh launchers --manager npm
      - name: Verify publish inventory
        shell: bash
        run: |
          version=$(node -p "require('./package.json').version")
          test "$(find dist/npm -maxdepth 1 -type f -name '*.tgz' | wc -l | tr -d ' ')" = 11
          for name in \
            rsproxy-darwin-arm64 rsproxy-darwin-x64 \
            rsproxy-linux-arm64-gnu rsproxy-linux-arm64-musl \
            rsproxy-linux-x64-gnu rsproxy-linux-x64-musl \
            rsproxy-win32-arm64-msvc rsproxy-win32-x64-msvc \
            rsproxy-runtime rsproxy-cli rsproxy-bun
          do
            test -f "dist/npm/$name-$version.tgz"
          done
      - name: Publish native packages
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          version=$(node -p "require('./package.json').version")
          for name in \
            rsproxy-darwin-arm64 rsproxy-darwin-x64 \
            rsproxy-linux-arm64-gnu rsproxy-linux-arm64-musl \
            rsproxy-linux-x64-gnu rsproxy-linux-x64-musl \
            rsproxy-win32-arm64-msvc rsproxy-win32-x64-msvc
          do
            npm publish "dist/npm/$name-$version.tgz" --access public --provenance
          done
      - name: Publish runtime and launchers
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          version=$(node -p "require('./package.json').version")
          npm publish "dist/npm/rsproxy-runtime-$version.tgz" --access public --provenance
          npm publish "dist/npm/rsproxy-cli-$version.tgz" --access public --provenance
          npm publish "dist/npm/rsproxy-bun-$version.tgz" --access public --provenance

  github-release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - native
      - publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Download release archives
        uses: actions/download-artifact@v6
        with:
          pattern: archive-*
          path: dist/github
          merge-multiple: true
      - name: Verify archive inventory and assemble checksums
        shell: bash
        run: |
          test "$(find dist/github -maxdepth 1 -type f | wc -l | tr -d ' ')" = 8
          (cd dist/github && shasum -a 256 rsproxy-* > SHA256SUMS)
      - name: Extract release notes from the changelog
        shell: bash
        run: |
          version=${GITHUB_REF_NAME#v}
          awk -v version="$version" '/^## \[/ { flag = index($0, "## [" version "] ") == 1 } flag' CHANGELOG.md > "$RUNNER_TEMP/release-notes.md"
          test -s "$RUNNER_TEMP/release-notes.md"
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --verify-tag --title "$GITHUB_REF_NAME" --notes-file "$RUNNER_TEMP/release-notes.md" dist/github/*
