name: CI

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  gate:
    name: Manual CI approval
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: ci-approval
    steps:
      - name: Record CI approval
        run: echo "CI run approved for $GITHUB_SHA"

  workspace:
    name: Workspace (${{ matrix.os }})
    needs: gate
    if: ${{ !cancelled() && (needs.gate.result == 'success' || needs.gate.result == 'skipped') }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Install cargo-nextest
        run: cargo install cargo-nextest --version 0.9.140 --locked
      # Keep each native command in its own step: PowerShell otherwise reports
      # only the final command's exit code and can hide an earlier failure.
      - name: Check repository line limits
        run: cargo xtask check lines
      - name: Check repository layout
        run: cargo xtask check layout
      - name: Check typed errors
        run: cargo xtask check typed-errors
      - name: Check workflows
        run: cargo xtask check workflows
      - name: Check all targets
        run: cargo check --workspace --all-targets --locked
      - name: Test all targets
        run: cargo nextest run --workspace --all-targets --no-fail-fast --locked
      - name: Build release binaries
        run: cargo build --release --workspace --locked

  msrv:
    name: Minimum Rust 1.88
    needs: gate
    if: ${{ !cancelled() && (needs.gate.result == 'success' || needs.gate.result == 'skipped') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install minimum supported Rust
        uses: dtolnay/rust-toolchain@1.88.0
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: msrv-1.88
      - name: Check workspace at MSRV
        run: cargo check --workspace --locked

  lints:
    name: Formatting, Clippy, and docs
    needs: gate
    if: ${{ !cancelled() && (needs.gate.result == 'success' || needs.gate.result == 'skipped') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install stable Rust with quality tools
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: lints
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Check Rust documentation
        run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps --locked

  repository-contracts:
    name: Repository contracts
    needs: gate
    if: ${{ !cancelled() && (needs.gate.result == 'success' || needs.gate.result == 'skipped') }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Install pinned Rust public-API toolchain
        run: rustup toolchain install nightly-2026-07-10 --profile minimal
      - name: Install Rust public-API checker
        run: cargo install cargo-public-api --version 0.52.0 --locked
      - name: Check repository structure
        run: cargo xtask check all
      - name: Check shell syntax
        run: find scripts benches -type f -name '*.sh' -exec sh -n {} \;
      - name: Check fuzz target
        run: cargo check --manifest-path fuzz/Cargo.toml --bin parse_resolve --locked

  distribution:
    name: Distribution contracts
    needs: gate
    if: ${{ !cancelled() && (needs.gate.result == 'success' || needs.gate.result == 'skipped') }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: distribution
      - name: Run protocol matrix
        run: ./scripts/verify.sh matrix
      - name: Run action contracts
        run: ./scripts/verify.sh actions
      - name: Run distribution contract
        run: ./scripts/verify.sh package

  supply-chain:
    name: Supply chain policy
    needs: gate
    if: ${{ !cancelled() && (needs.gate.result == 'success' || needs.gate.result == 'skipped') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Check advisories, licenses, bans, and sources
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          rust-version: "1.88"
          command: check
          arguments: --all-features --locked
          command-arguments: advisories bans licenses sources

  coverage:
    name: Production line coverage
    needs: gate
    if: ${{ !cancelled() && (needs.gate.result == 'success' || needs.gate.result == 'skipped') }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install stable Rust with coverage tools
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: coverage
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --version 0.6.21 --locked
      - name: Enforce production line coverage
        run: ./scripts/verify.sh coverage-report
      - name: Upload coverage reports
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: target/coverage
          if-no-files-found: error
          retention-days: 14
