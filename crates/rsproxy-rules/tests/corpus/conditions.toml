[[case]]
id = "condition-method-falls-through"
spec = true
rules = "example.test status(201) when method(POST)\nexample.test status(202)"
expect_actions = ["status"]
expect_rules = ["default:2"]
[case.request]
method = "GET"
url = "http://example.test/"

