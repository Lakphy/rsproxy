expect_actions = ["map.remote"]
expect_rules = ["default:1"]
expect_explain = ["default:1 map.remote(http://127.0.0.1:3000)"]
[case.request]
url = "http://example.test/app/index.js"

[[case]]
id = "action-map-remote-first-match-wins"
