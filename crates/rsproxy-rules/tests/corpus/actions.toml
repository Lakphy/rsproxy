url = "http://example.test/"

[[case]]
id = "action-mock-raw"
rules = 'example.test mock.raw("HTTP/1.1 207 Multi-Status\\r\\nX-Test: yes\\r\\n\\r\\nbody")'
expect_actions = ["mock"]
expect_rules = ["default:1"]
[case.request]
url = "http://example.test/"

[[case]]
id = "action-map-remote-transparent-forward"
spec = true
