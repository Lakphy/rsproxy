required_action_families = [
  "host", "upstream", "direct", "mock", "map.remote", "status", "redirect",
  "req.header", "res.header", "res.status", "req.method", "req.cookie",
  "res.cookie", "req.ua", "req.referer", "req.auth", "req.forwarded",
  "req.type", "req.charset", "res.cors", "res.type", "res.charset",
  "res.merge", "res.trailer", "attachment", "cache", "tls",
  "url.rewrite", "url.query", "delete", "req.body.set", "req.body.prepend",
  "req.body.append", "req.body.replace", "res.body.set", "res.body.prepend",
  "res.body.append", "res.body.replace", "inject", "delay.req", "delay.res",
  "throttle.req", "throttle.res", "bypass", "hide", "tag", "skip",
]

[[case]]
id = "action-routing-families"
rules = "example.test host(127.0.0.1:18081, 127.0.0.1:18082) upstream(proxy://127.0.0.1:18083) direct"
expect_actions = ["host", "upstream", "direct"]
expect_rules = ["default:1"]
[case.request]
url = "http://example.test/"

[[case]]
id = "action-host-round-robin"
spec = true
rules = "example.test host(127.0.0.1:18081, 127.0.0.1:18082)"
expect_actions = ["host"]
expect_rules = ["default:1"]
expect_explain = ["default:1 host(127.0.0.1:18081, 127.0.0.1:18082)"]
[case.request]
url = "http://example.test/"

[[case]]
id = "action-mock-inline-template"
rules = 'example.test mock("hello-${hostname}-$1")'
expect_actions = ["mock"]
expect_rules = ["default:1"]
[case.request]
url = "http://example.test/"

[[case]]
id = "action-mock-file"
rules = "example.test mock(<mocks/response.json>)"
expect_actions = ["mock"]
expect_rules = ["default:1"]
[case.request]
url = "http://example.test/"

[[case]]
id = "action-mock-reference"
rules = "example.test mock(@fixture)"
expect_actions = ["mock"]
expect_rules = ["default:1"]
