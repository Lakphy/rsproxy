expect_actions = ["delay.req", "delay.res", "throttle.req", "throttle.res"]
expect_rules = ["default:1"]
[case.request]
url = "http://example.test/"

[[case]]
id = "action-control-and-tls-families"
rules = '''example.test tls(min=1.2, ciphers=TLS_AES_128_GCM_SHA256, client-cert=<client.pem>, client-key=<client-key.pem>) bypass hide tag(api:${path}) skip(req.header)'''
