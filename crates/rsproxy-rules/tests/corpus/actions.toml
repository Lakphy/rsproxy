[[case]]
id = "error-header-replace-regex"
spec = true
rules = "example.test res.header(x-release ~ /[/release)"
error_codes = ["action"]
error_groups = ["default"]
error_lines = [1]

[[case]]
id = "error-action-family-parameters"
rules = """
example.test host()
example.test status(not-a-code)
example.test delay(side, 1s)
example.test unknown.action(value)
"""
error_codes = ["action", "action", "action", "action"]
error_groups = ["default", "default", "default", "default"]
error_lines = [1, 2, 3, 4]

[[case]]
id = "error-structured-value-boundaries"
rules = """
example.test req.header(x-value: @../escape)
example.test tag(@bad/key)
example.test mock(<>)
"""
error_codes = ["action", "action", "action"]
error_groups = ["default", "default", "default"]
error_lines = [1, 2, 3]
