[[classification]]
protocol = "disable"
options = ["autoCors", "rejectUnauthorized", "secureOptions", "tunnelAuthHeader"]
status = "native-default"
reason = "rsproxy does not auto-add file CORS, validates origin TLS with safe defaults, and strips downstream proxy credentials before forwarding."

[[classification]]
protocol = "disable"
options = ["bigData", "dnsCache"]
status = "process-config"
configuration = ["--trace-body-limit", "--dns-cache"]
reason = "Capture and DNS-cache limits are explicit process configuration rather than v1 per-rule actions."

[[classification]]
protocol = "disable"
options = ["keepAlive", "keepH2Session"]
