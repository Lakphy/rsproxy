[[classification]]
protocol = "enable"
options = ["hide"]
status = "implemented"
rsproxy = "example.test hide"
expect_actions = ["hide"]
reason = "The rsproxy hide action suppresses the matched session from Trace."

[[classification]]
protocol = "enable"
options = ["clientIp"]
status = "implemented"
rsproxy = "example.test req.forwarded(${clientIp})"
expect_actions = ["req.forwarded"]
reason = "The client IP can be forwarded explicitly through X-Forwarded-For."

[[classification]]
protocol = "enable"
options = ["clientCert"]
status = "implemented"
rsproxy = "example.test tls(client-cert=<client.pem>, client-key=<client-key.pem>)"
expect_actions = ["tls"]
reason = "Origin mTLS is selected by an explicit certificate and key pair."

[[classification]]
protocol = "enable"
options = ["capture", "https", "captureIp"]
status = "native-default"
reason = "With a configured CA, default CONNECT policy inspects TLS hosts including literal IPs."

[[classification]]
protocol = "enable"
options = ["h2", "http2"]
status = "native-default"
reason = "Downstream and origin ALPN automatically negotiate h2 whenever both peers support it."

[[classification]]
protocol = "enable"
options = ["keepCSP", "keepAllCSP", "keepCache", "keepAllCache"]
status = "native-default"
reason = "rsproxy injection preserves existing CSP and cache response headers by default."

[[classification]]
protocol = "enable"
options = ["keepClientId"]
status = "native-default"
reason = "Arbitrary client-id headers are preserved unless a rule explicitly removes them."

[[classification]]
protocol = "enable"
options = ["socket"]
status = "native-default"
reason = "Unknown protocols detected inside CONNECT fall back to a byte tunnel in auto mode."

[[classification]]
protocol = "enable"
options = ["bigData"]
status = "process-config"
configuration = ["--trace-body-limit"]
reason = "Capture limits are explicit process configuration rather than a v1 per-rule action."

[[classification]]
protocol = "enable"
options = ["abort", "abortReq", "abortRes", "auto2http", "br", "gzip", "deflate", "captureStream", "clientId", "flushHeaders", "forHttp", "forHttps", "httpH2", "showHost", "ignoreSend", "ignoreReceive", "pauseSend", "pauseReceive", "inspect", "proxyFirst", "proxyHost", "proxyTunnel", "safeHtml", "strictHtml", "multiClient", "requestWithMatchedRules", "responseWithMatchedRules", "tunnelHeadersFirst", "weakRule", "websocket"]
status = "deferred-v2"
reason = "These protocol, transfer, compression, and response-policy switches are outside the explicit v1 action set in the technical design."

[[classification]]
protocol = "enable"
options = ["authCapture", "customParser", "forceReqWrite", "forceResWrite", "interceptConsole", "internalProxy", "useLocalHost", "useSafePort"]
status = "deferred-v2"
reason = "These options depend on plugins, script hooks, capture-to-file, or Whistle-internal routing."

[[classification]]
protocol = "enable"
options = ["hideComposer", "hideCaptureError", "userLogin"]
status = "removed-v1"
reason = "These options target Whistle-specific Composer or management UI behavior."

[[classification]]
protocol = "disable"
options = ["301"]
status = "implemented"
rsproxy = "example.test res.status(302) when status(301)"
expect_actions = ["res.status"]
reason = "A response-period status condition rewrites only 301 responses."

[[classification]]
