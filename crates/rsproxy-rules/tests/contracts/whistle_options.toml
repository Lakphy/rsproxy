reason = "Per-rule connection-pool disable semantics are outside the explicit v1 action set."

[[classification]]
protocol = "disable"
options = ["abort", "abortReq", "abortRes", "auto2http", "cache", "captureIp", "captureStream", "clientCert", "flushHeaders", "forHttp", "forHttps", "gzip", "h2", "http2", "httpH2", "hide", "proxyFirst", "proxyHost", "proxyTunnel", "keepCSP", "keepAllCSP", "keepCache", "keepAllCache", "keepClientId", "safeHtml", "strictHtml", "proxyConnection", "proxyUA", "requestWithMatchedRules", "responseWithMatchedRules", "timeout", "trailerHeader", "tunnelHeadersFirst", "weakRule"]
status = "deferred-v2"
